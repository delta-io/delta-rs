name: Prepare Rust Builder
description: "Prepare Rust Build Environment"
runs:
  using: "composite"
  steps:
    - name: Cache Cargo
      # v5.0.4 <https://github.com/actions/cache/releases/tag/v5.0.4>
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
      with:
        # these represent dependencies downloaded by cargo
        # and thus do not depend on the OS, arch nor rust version.
        #
        # source https://github.com/actions/cache/blob/main/examples.md#rust---cargo
        path: |
          /usr/local/cargo/bin/
          /usr/local/cargo/registry/index/
          /usr/local/cargo/registry/cache/
          /usr/local/cargo/git/db/
        key: cargo-cache3-${{ hashFiles('**/Cargo.toml') }}
        restore-keys: cargo-cache3-

    - name: Disable debuginfo generation
      # Disable full debug symbol generation to speed up CI build and keep memory down
      # "1" means line tables only, which is useful for panic tracebacks.
      shell: bash
      run: echo "RUSTFLAGS=-C debuginfo=1" >> $GITHUB_ENV
    - name: Enable backtraces
      shell: bash
      run: echo "RUST_BACKTRACE=1" >> $GITHUB_ENV
    - name: Disable incremental compilation
      shell: bash
      run: echo CARGO_INCREMENTAL=0 >> $GITHUB_ENV

    # v0.0.9 <https://github.com/Mozilla-Actions/sccache-action/releases/tag/v0.0.9>
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad
    - name: Enable sccahe
      shell: bash
      run: echo RUSTC_WRAPPER=sccache >> $GITHUB_ENV

    # v1.15.4 <https://github.com/actions-rust-lang/setup-rust-toolchain/releases/tag/v1.15.4>
    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
      with:
        toolchain: stable
        components: rustfmt,clippy
        cache: true
        # if we ever get rid of all the clippy warnings, we can remove this line
        rustflags: ""
