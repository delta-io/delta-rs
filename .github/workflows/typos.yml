name: chores

# Trigger whenever a PR is changed (title as well as new / changed commits)
on:
  pull_request:

jobs:
  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check spelling
        # <https://github.com/crate-ci/typos/releases/tag/v1.44.0>
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d
